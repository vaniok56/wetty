services:
  terminal-cactuz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-cactuz
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./secrets/id_ed25519:/run/terminal-ssh/id_ed25519:ro
      - ./secrets/known_hosts:/run/terminal-ssh/known_hosts:ro
      - ./conf/targets.json5:/run/terminal-targets.json5:ro

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: terminal-tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - terminal-cactuz
